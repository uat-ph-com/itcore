        :root {
            --primary: #d41111;
            --primary-dark: #a50d0d;
            --primary-light: #ee2b2b;
            --black: #141414;
            --dark-bg: #1f1f1f;
            --darker-bg: #0d0d0d;
            --foreground: #f2f2f2;
            --border: #333;
            --gray: #737373
        }

        html {
            scroll-behavior: smooth
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px
        }

        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            cursor: pointer;
            border: none;
            border-radius: .5rem;
            padding: 1rem 2.5rem;
            font-size: 1.125rem;
            font-weight: 600;
            transition: all .2s
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px #c5121266
        }

        .navbar {
            z-index: 1000;
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--primary);
            background: white;
            position: fixed;
            top: 0;
            left: 0;
            right: 0
        }

        .navbar-container {
            justify-content: space-between;
            align-items: center;
            max-width: 1280px;
            height: 80px;
            margin: 0 auto;
            padding: 0 1.5rem;
            display: flex
        }

        .nav-menu {
            gap: 2rem;
            list-style: none;
            display: none
        }

        .nav-menu.show {
            text-align: center;
            background: white;
            flex-direction: column;
            width: 100%;
            height: auto;
            padding: 35px;
            display: flex;
            position: absolute;
            top: calc(100% + 1px);
            left: 0;
            box-shadow: 1px 5px 5px #0001;
        }

        .nav-menu a {
            color: #434854;
            font-weight: 500;
            text-decoration: none;
            transition: color .2s
        }

        .nav-menu a:hover {
            color: var(--primary)
        }

        .nav-right {
            align-items: center;
            gap: 1rem;
            display: flex
        }

        /* The main container */
        .nav-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 40px;
        }


        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .logo-image {
            height: 60px;
            width: auto;
            mix-blend-mode: multiply;
            display: block;
            align-items: center;
        }

        .logo-subtitle {
            color: rgba(14, 13, 13, 0.6);
            font-size: .65rem
        }

        .social-links {
            gap: 1rem;
            display: flex
        }

        .social-links a {
            --x-color: var(--foreground);
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: var(--primary)
        }

        .facebook-link {
            color: #1877F2 !important;
        }

        .whatsapp-link {
            color: #25D366 !important;
        }

        .menu-toggle {
            color: #2d3436;
            cursor: pointer;
            background: 0 0;
            border: none;
            font-size: 1.5rem;
            display: block
        }

        .lang-toggle {
            color: #fff;
            cursor: pointer;
            background: #ffffff1a;
            border: 1px solid #fff3;
            border-radius: 50px;
            align-items: center;
            gap: .5rem;
            padding: .4rem 1rem;
            font-size: .9rem;
            transition: all .3s;
            display: flex
        }

        .lang-toggle:hover {
            background: var(--primary);
            border-color: var(--primary)
        }

        .lang-toggle i {
            font-size: 1rem
        }

        @media (width>=1024px) {
            .nav-menu {
                display: flex !important
            }

            .nav-menu.show {
                flex-direction: unset;
                background: unset;
                position: unset;
                height: unset;
                width: unset;
                display: flex !important
            }

            .menu-toggle {
                display: none
            }
        }

        .hero-slider {
            height: 100vh;
            margin-top: 80px;
            position: relative;
            overflow: hidden
        }

        .slide {
            opacity: 0;
            transition: opacity .5s ease-in-out;
            position: absolute;
            inset: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.5s ease
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto
        }

        .slide-image {
            object-fit: cover;
            width: 100%;
            height: 100%
        }

        .slide-overlay {
            background: linear-gradient(90deg, #0d0d0de6 0%, #c512124d 50%, #0d0d0de6 100%);
            position: absolute;
            inset: 0
        }

        [dir=rtl] .slide-overlay {
            background: linear-gradient(270deg, #0d0d0de6 0%, #c512124d 50%, #0d0d0de6 100%)
        }

        .slide-content {

            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100%;
            padding: 0 5%;
            font-size: 0.95rem;
            max-width: 900px;
            line-height: 1.4;
            margin: 0 auto 1.5rem auto;
            text-align: center;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: center;
            unicode-bidi: isolate;
        }

        .slide-inner {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem
        }

        .slide-text {
            max-width: 42rem
        }

        .slide-title {
            color: #fff;
            margin-bottom: 1;
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 700;
            width: 100%;
            white-space: nowrap;
            width: 100%;
            text-align: center;
            font-size: clamp(1.8rem, 4.5vw, 4rem);
        }

        .slide-title .highlight {
            color: var(--primary)
        }

        .slide-description {
            color: #ffffffe6;
            margin: 0px 25px;
            margin-bottom: 2rem;
            font-size: clamp(1rem, 2vw, 1.25rem);
            line-height: 1.8
        }

        .slider-arrow {
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border: 1px solid var(--primary);
            color: #fff;
            cursor: pointer;
            z-index: 10;
            background: #c512124d;
            border-radius: 50%;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
            transition: all .2s;
            display: flex;
            position: absolute;
            top: 50%;
            transform: translateY(-50%)
        }

        .slider-arrow:hover {
            background: var(--primary)
        }

        .slider-arrow.prev {
            left: 1.5rem
        }

        .slider-arrow.next {
            right: 1.5rem
        }

        [dir=rtl] .slider-arrow.prev {
            left: auto;
            right: 1.5rem
        }

        [dir=rtl] .slider-arrow.next {
            left: 1.5rem;
            right: auto
        }

        .slider-dots {
            z-index: 10;
            gap: .75rem;
            display: flex;
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translate(-50%)
        }

        .dot {
            cursor: pointer;
            background: #fff6;
            border: none;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            transition: all .3s
        }

        .dot.active {
            background: var(--primary);
            border-radius: 6px;
            width: 48px
        }

        .about-section {
            background: white;
            padding: 5rem 0
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem
        }

        .section-title {
            color: #fff;
            margin-bottom: 1rem;
            font-size: 2.5rem;
            font-weight: 900
        }

        .section-divider {
            background: white;
            border-radius: 2px;
            width: 6rem;
            height: 4px;
            margin: 0 auto 1.5rem
